site_name: samplesize-copilot
site_description: Sample-size and power calculations for clinical and applied research
site_url: https://kimmingul.github.io/samplesize-copilot/
repo_url: https://github.com/kimmingul/samplesize-copilot
repo_name: kimmingul/samplesize-copilot
edit_uri: edit/main/docs/

theme:
  name: material
  features:
    - navigation.sections
    - navigation.tabs
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to light mode

nav:
  - Home: index.md
  - Examples:
    - One-sample t: examples/01-one-mean-t-test.md
    - Two-sample t: examples/02-two-means-t-test.md
    - Cox survival: examples/03-cox-survival.md
    - Cluster RCT: examples/04-cluster-rct.md
    - Simon two-stage: examples/05-simon-two-stage.md
  - Architecture: ARCHITECTURE.md
  - Cookbook: COOKBOOK.md
  - Method Coverage: METHOD_COVERAGE.md
  - Roadmap: ROADMAP.md
  - Troubleshooting: TROUBLESHOOTING.md
  - Release Process: RELEASE.md

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.arithmatex:
      generic: true

extra_javascript:
  - https://cdnjs.cloudflare.com/ajax/libs/mathjax/3.2.2/es5/tex-mml-chtml.min.js
