chapter: "Tests for the Ratio of Two Poisson Rates"
method: "two_sample_poisson_rates"
examples:

  - id: "Ex1 Ch.437 RRa=2 N1=29737"
    description: >
      Ch.437 Example 1: lam1=0.0005, RRa=2, t1=t2=2, alpha=0.05, power=0.90, one-sided.
      Reference reports N1=N2=29737 (N=59474) with achieved power=0.90001.
    solve_for: "n"
    inputs:
      lam1: 0.0005
      rra: 2.0
      rr0: 1.0
      t1: 2.0
      t2: 2.0
      alpha: 0.05
      power: 0.90
      sides: 1
    expected: {n1: 29737, achieved_power: 0.90001}
    tolerance: {n1: 1, achieved_power: 0.005}
    source: "Tests for the Ratio of Two Poisson Rates (Example 1)"

