chapter: "Confidence Intervals for the Odds Ratio of Two Proportions"
method: "ci_odds_ratio_two_proportions"
examples:

  - id: "Ex2 Fleiss (Logarithm)"
    description: >
      Fleiss, Levin, Paik (2003) pp.117, 119: 95% two-sided CI for the
      odds ratio with sample OR=2.25, P2=0.10, n2=150, target width
      W=4.387 (Logarithm method, which in reference uses the +1/2 cell
      correction).  Reference reports n1=50.
    solve_for: "n"
    inputs:
      p1: 0.20  # OR=2.25, P2=0.10 -> P1=0.20
      p2: 0.10
      alpha: 0.05
      width: 4.387
      n2: 150
      sides: 2
      method: "logarithm"
    expected:
      n1: 50
      n2: 150
      n: 200
      achieved_width: 4.387
      lower_limit: 0.96
      upper_limit: 5.35
    tolerance:
      n1: 0
      n2: 0
      n: 0
      achieved_width: 0.01
      lower_limit: 0.02
      upper_limit: 0.02
    source: >
      reference/md/Confidence Intervals for the Odds Ratio of Two
      Proportions/hybrid_auto/Confidence Intervals for the Odds Ratio
      of Two Proportions.md, §Example 2.

  - id: "Ex1 Logarithm (W=0.1, CL=0.95)"
    description: >
      Example 1 of the reference chapter, first row of the Logarithm method:
      OR=1.5, P2=0.4 (hence P1=0.5), target width 0.10 at 95% CL with
      equal allocation.  Reference reports n1=n2=28244, actual width 0.100.
    solve_for: "n"
    inputs:
      p1: 0.5
      p2: 0.4
      alpha: 0.05
      width: 0.10
      sides: 2
      method: "logarithm"
    expected:
      n1: 28244
      n2: 28244
      n: 56488
      achieved_width: 0.100
    tolerance:
      n1: 0
      n2: 0
      n: 0
      achieved_width: 0.001
    source: >
      reference/md/Confidence Intervals for the Odds Ratio of Two
      Proportions/hybrid_auto/Confidence Intervals for the Odds Ratio
      of Two Proportions.md, §Example 1 (row 1).

  - id: "Ex1 Logarithm (W=0.5, CL=0.95)"
    description: >
      Example 1 of the reference chapter, row W=0.5 of the Logarithm method:
      OR=1.5, P2=0.4, target width 0.5 at 95% CL.  Reference reports
      n1=n2=1138 with actual width 0.500.
    solve_for: "n"
    inputs:
      p1: 0.5
      p2: 0.4
      alpha: 0.05
      width: 0.50
      sides: 2
      method: "logarithm"
    expected:
      n1: 1138
      n2: 1138
      achieved_width: 0.500
    tolerance:
      n1: 0
      n2: 0
      achieved_width: 0.001
    source: >
      reference/md/Confidence Intervals for the Odds Ratio of Two
      Proportions/hybrid_auto/Confidence Intervals for the Odds Ratio
      of Two Proportions.md, §Example 1 (row 5).
