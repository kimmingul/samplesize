chapter: "Tests for Two Means (Simulation)"
method: "tests_two_means_simulation"
# NOTE: Simulation-based method (seed=42, n_sims=10000).
# reference uses 2000 simulations and a different RNG.  Fixtures are
# calibrated against our deterministic implementation.
# Ex1 analytic reference: N1=N2=50 -> ~0.32, N1=N2=200 -> ~0.85.
examples:

  # ------------------------------------------------------------------
  # Example 1 – Power at N1=50, 100, 200 (Ch.440 reference).
  # mean1=0, mean2=0.6, sd=2, alpha=0.05, two-sided, normal.
  # Our sim (seed=42, 10000 sims) gives 0.3142 / 0.5650 / 0.8490.
  # reference (2000 sims) reports 0.324 / 0.563 / 0.855 — within ±0.01.
  # ------------------------------------------------------------------

  - id: "Ex1 N1=50 power"
    description: >
      Example 1: mean1=0, mean2=0.6, sd=2, alpha=0.05, two-sided,
      N1=N2=50.  reference (2000 sims) reports ~0.324; our (10000, seed=42)
      gives 0.3142.
    solve_for: "power"
    inputs:
      mean1: 0.0
      mean2: 0.6
      sd: 2.0
      alpha: 0.05
      n1: 50
      n2: 50
      sides: 2
      diff0: 0.0
      dist: "normal"
      n_sims: 10000
      seed: 42
    expected:
      achieved_power: 0.3142
    tolerance:
      achieved_power: 0.015
    source: "Tests for Two Means (Simulation) (Example 1 N1=50)"

  - id: "Ex1 N1=200 power"
    description: >
      Example 1: mean1=0, mean2=0.6, sd=2, alpha=0.05, two-sided,
      N1=N2=200.  reference (2000 sims) reports ~0.855; our (10000, seed=42)
      gives 0.8490.
    solve_for: "power"
    inputs:
      mean1: 0.0
      mean2: 0.6
      sd: 2.0
      alpha: 0.05
      n1: 200
      n2: 200
      sides: 2
      diff0: 0.0
      dist: "normal"
      n_sims: 10000
      seed: 42
    expected:
      achieved_power: 0.8490
    tolerance:
      achieved_power: 0.015
    source: "Tests for Two Means (Simulation) (Example 1 N1=200)"
