      beta: 0.05
      lot_size: 5000
    expected: {n: 152, achieved_power: 0.95129}
    tolerance: {n: 1, achieved_power: 0.005}
    source: "Acceptance Sampling for Attributes (Example 2)"

  # Example 2 row: alpha=0.05, p1=0.05, lot=5000 -> n=123, c=2
