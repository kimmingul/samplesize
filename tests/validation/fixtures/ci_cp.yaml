  - id: "Ex2 Mathews (CL=0.90, Cp=1.0, target W=0.20)"
    description: >
      Two-sided 90% CI for Cp with target width 0.20 and planning Cp=1.0.
      Reference reports N=137 with actual width 0.199 and limits 0.900, 1.099.
      Mathews (2010 p.230) reports N=136 via a normal approximation to the
      chi-square; reference (and this implementation) use exact chi-square
      inversion.
    inputs:
      cp: 1.0
      alpha: 0.10
      sides: 2
      width: 0.20
    expected:
      n: 137
      achieved_width: 0.199
      lower_limit: 0.900
      upper_limit: 1.099
    tolerance:
      n: 0
      achieved_width: 0.001
      lower_limit: 0.001
      upper_limit: 0.001
    source: "Confidence Intervals for Cp (Example 2)"
