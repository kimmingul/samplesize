chapter: "Confidence Intervals for Cp"
method: "ci_cp"
examples:

  - id: "Ex1 row 1 (CL=0.95, Cp=1.0, target W=0.10)"
    description: >
      Two-sided 95% CI for Cp with target width 0.10 and planning Cp=1.0.
      Reference reports N=769 with actual width 0.100 and limits 0.950, 1.050.
    inputs:
      cp: 1.0
      alpha: 0.05
      sides: 2
      width: 0.10
    expected:
      n: 769
      achieved_width: 0.100
      lower_limit: 0.950
      upper_limit: 1.050
    tolerance:
      n: 0
      achieved_width: 0.001
      lower_limit: 0.001
      upper_limit: 0.001
    source: "Confidence Intervals for Cp (Example 1, row 1)"

