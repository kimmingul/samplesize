chapter: "Superiority by a Margin Tests for the Difference of Two Means in a Higher-Order Cross-Over Design"
method: "superiority_by_margin_higher_order_cross_over_diff"
examples:

  # Example 1: 3x2 dual, D = 15, sigma_w = 10, alpha = 0.025.
  - id: "Ex1 N=6 |SM|=5 (3x2 dual) - power"
    description: >
      Chapter 528, Example 1.  3x2 dual, N = 6, |SM| = 5,
      D = 15, sigma_w = 10, alpha = 0.025, higher means better.
      Expected power = 0.3837.
    inputs:
      margin: 5.0
      diff: 15.0
      sd_w: 10.0
      design: "two_sequence_dual"
      higher_means_better: true
      alpha: 0.025
      n: 6
    expected: {n: 6, achieved_power: 0.3837}
    tolerance: {n: 0, achieved_power: 0.001}
    source: "Superiority by a Margin Tests for the Difference of Two Means in a Higher-Order Cross-Over Design (Example 1)"

  - id: "Ex1 N=16 |SM|=5 (3x2 dual) - power"
