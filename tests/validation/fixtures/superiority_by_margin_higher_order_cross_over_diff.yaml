  # Example 2: Sample Size (Exact) for 80%/90% power.
  - id: "Ex2 |SM|=5 power=0.80 (3x2 dual exact) - N"
    description: >
      Chapter 528, Example 2.  3x2 dual, |SM| = 5, D = 15,
      sigma_w = 10, alpha = 0.025, target power = 0.80, exact.
      Expected N = 13, achieved power = 0.8032.
    inputs:
      margin: 5.0
      diff: 15.0
      sd_w: 10.0
      design: "two_sequence_dual"
      higher_means_better: true
      alpha: 0.025
      power: 0.80
      equal_per_sequence: false
    expected: {n: 13, achieved_power: 0.8032}
    tolerance: {n: 0, achieved_power: 0.001}
    source: "Superiority by a Margin Tests for the Difference of Two Means in a Higher-Order Cross-Over Design (Example 2)"

