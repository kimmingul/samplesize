    expected: {n: 72, achieved_power: 0.9065}
    tolerance: {n: 0, achieved_power: 0.001}
    source: "Equivalence Tests for the Difference of Two Means in a Higher-Order Cross-Over Design (Example 3)"

  - id: "Ex3 Balaam D=0.15 power=0.90 - N (Chen 1997)"
    description: >
