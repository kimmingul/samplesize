chapter: "Superiority by a Margin Tests for the Ratio of Two Proportions"
method: "superiority_by_margin_ratio_two_proportions"
examples:

  - id: "Ex1 the reference N=100 R0=1.1 R1=1.2 P2=0.65"
    description: >
      the reference Example 1 Numeric Results: P2=0.65, R0=1.1, R1=1.2,
      alpha=0.025, N1=N2=100, Higher Proportions Better.
      Farrington-Manning, normal approximation.  Reported power
      0.16144.
    inputs:
      p2: 0.65
      margin: 1.1
      r1: 1.2
      alpha: 0.025
      n1: 100
      n2: 100
      higher_is_better: true
    expected: {n1: 100, n2: 100, achieved_power: 0.16144}
    tolerance: {n1: 0, n2: 0, achieved_power: 0.0005}
    source: "Superiority by a Margin Tests for the Ratio of Two Proportions (Example 1 Numeric Results)"

