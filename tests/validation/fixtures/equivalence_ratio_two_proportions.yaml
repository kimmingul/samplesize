chapter: "Equivalence Tests for the Ratio of Two Proportions"
method: "equivalence_ratio_two_proportions"
examples:

  - id: "Ex1 the reference N=100 R0L=0.75 R0U=1.333 R1=1.0 P2=0.65"
    description: >
      the reference Example 1 Numeric Results: P2=0.65, R0.L=0.75,
      R0.U=1.333, R1=1.0, alpha=0.05, N1=N2=100.  Farrington-Manning
      TOST, normal approximation.  Reported power 0.7120.
    inputs:
      p2: 0.65
      lower_limit: 0.75
      upper_limit: 1.333
      r1: 1.0
      alpha: 0.05
      n1: 100
      n2: 100
    expected: {n1: 100, n2: 100, achieved_power: 0.7120}
    tolerance: {n1: 0, n2: 0, achieved_power: 0.001}
    source: "Equivalence Tests for the Ratio of Two Proportions (Example 1 Numeric Results row 2)"

