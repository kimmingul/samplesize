  # ------------------------------------------------------------------
  # Example 2 - Validation against the sup-by-margin differences
  # procedure (Chapter 508).  Identical numerics by construction.
  # ------------------------------------------------------------------
  - id: "Ex2 Validation diff vs ratio - N=250"
    description: >
      Example 2 Chapter 513 validation: power values match the
      sup-by-margin differences procedure with E = ln(1.2) and
      Sw = sqrt(ln(1.5^2 + 1)).  Spot-check N = 250.
    inputs:
      margin: 0.20
      r1: 1.40
      cv: 1.50
      alpha: 0.05
      n: 250
      higher_means: "better"
