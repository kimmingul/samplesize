chapter: "Superiority by a Margin Tests for Two Means in a 2x2 Cross-Over Design using Ratios"
method: "superiority_by_margin_cross_over_ratios"

# Examples from the reference Chapter 513.  Mechanics mirror Chapter 515 with
# the log-scale rejection region at ln(1 + SM) (better) or ln(1 - SM)
# (worse).
examples:

  # ------------------------------------------------------------------
  # Example 1 power-at-N rows.  SM = 0.20, R1 = 1.40, CV = 1.50,
  # alpha = 0.05, higher_means = 'better'.
  # ------------------------------------------------------------------
  - id: "Ex1 N=50 - Power"
    description: >
      Example 1 Chapter 513: SM = 0.20, R1 = 1.40, CV = 1.50,
      alpha = 0.05, N = 50.  Reference reports power = 0.1724.
    inputs:
      margin: 0.20
      r1: 1.40
      cv: 1.50
      alpha: 0.05
      n: 50
      higher_means: "better"
    expected: {n: 50, achieved_power: 0.1724}
    tolerance: {n: 0, achieved_power: 0.0001}
    source: "Superiority by a Margin Tests for Two Means in a 2x2 Cross-Over Design using Ratios (Example 1 row N=50)"

  - id: "Ex1 N=150 - Power"
