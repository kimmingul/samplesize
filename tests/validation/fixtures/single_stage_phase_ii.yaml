    inputs:
      p0: 0.05
      p1: 0.10
      alpha: 0.05
      beta: 0.20
    expected:
      n: 169
      achieved_power: 0.806
    tolerance:
      n: 0
      achieved_power: 0.005
    source: "Single-Stage Phase II Clinical Trials (Example 1)"

