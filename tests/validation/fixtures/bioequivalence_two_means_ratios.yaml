chapter: "Equivalence Tests for Two Means in a 2x2 Cross-Over Design using Ratios"
method: "bioequivalence_two_means_ratios"
examples:

  # ------------------------------------------------------------------
  # Example 2 - Validation using Julious (2004).  Reference reports
  # achieved power = 0.9023 / 0.9060 / 0.9012 / 0.9121 at N = 28 / 52
  # / 120 / 18 for the four ratio limits 0.80 / 0.85 / 0.90 / 0.75
  # with CV = 0.25, true ratio = 1.0, alpha = 0.05, target power 0.90.
  # ------------------------------------------------------------------

  - id: "Ex2 Julious 2004 - RL=0.80 (FDA 80/125)"
    description: >
      Julious (2004) p.1963 / Example 2: RL = 0.80, RU = 1.25,
      ratio = 1.00, CV = 0.25, alpha = 0.05, target power 0.90.
      Reference reports N = 28, achieved power = 0.9023.
    inputs:
      ratio: 1.00
      lower_limit: 0.80
      upper_limit: 1.25
      cv: 0.25
      alpha: 0.05
      power: 0.90
    expected: {n: 28, achieved_power: 0.9023}
    tolerance: {n: 0, achieved_power: 0.0001}
    source: "Equivalence Tests for Two Means in a 2x2 Cross-Over Design using Ratios (Example 2 row 2)"

  - id: "Ex2 Julious 2004 - RL=0.85"
    description: >
      Julious (2004) p.1963 / Example 2: RL = 0.85, RU = 1/0.85,
      ratio = 1.00, CV = 0.25, alpha = 0.05, target power 0.90.
      Reference reports N = 52, achieved power = 0.9060.
    inputs:
      ratio: 1.00
      lower_limit: 0.85
      upper_limit: 1.1764705882352942   # 1/0.85
      cv: 0.25
      alpha: 0.05
      power: 0.90
    expected: {n: 52, achieved_power: 0.9060}
    tolerance: {n: 0, achieved_power: 0.0001}
    source: "Equivalence Tests for Two Means in a 2x2 Cross-Over Design using Ratios (Example 2 row 3)"

  - id: "Ex2 Julious 2004 - RL=0.90"
    description: >
      Julious (2004) p.1963 / Example 2: RL = 0.90, RU = 1/0.90,
      ratio = 1.00, CV = 0.25, alpha = 0.05, target power 0.90.
      Reference reports N = 120, achieved power = 0.9012.
    inputs:
      ratio: 1.00
      lower_limit: 0.90
      upper_limit: 1.1111111111111112   # 1/0.90
      cv: 0.25
      alpha: 0.05
      power: 0.90
    expected: {n: 120, achieved_power: 0.9012}
    tolerance: {n: 0, achieved_power: 0.0001}
    source: "Equivalence Tests for Two Means in a 2x2 Cross-Over Design using Ratios (Example 2 row 4)"

  - id: "Ex2 Julious 2004 - RL=0.75"
    description: >
      Julious (2004) p.1963 / Example 2: RL = 0.75, RU = 1/0.75,
      ratio = 1.00, CV = 0.25, alpha = 0.05, target power 0.90.
