chapter: "Kruskal-Wallis Tests (Simulation)"
method: "kruskal_wallis_simulation"
examples:

  - id: "Ex1 Ch.556 4-group normal n=8 per group"
    description: >
      Chapter 556 Example 1: 4 groups, Normal distribution,
      means=[40,10,10,10], sd=18, n=8 per group, alpha=0.05.
      reference (5000 sims) reports power=0.863. Seed=42, n_sims=5000.
    solve_for: "power"
    inputs:
      n_per_group: 8
      group_means: [40.0, 10.0, 10.0, 10.0]
      group_sds: 18.0
      distribution: "normal"
      alpha: 0.05
      n_sims: 5000
      seed: 42
    expected:
      n: 32
      achieved_power: 0.861
    tolerance:
      n: 0
      achieved_power: 0.015
    source: "Kruskal-Wallis Tests (Simulation) (Example 1)"

  - id: "Ex1 Ch.556 4-group normal n=12 per group"
    description: >
      Chapter 556 Example 1: 4 groups, Normal distribution,
      means=[40,10,10,10], sd=18, n=12 per group, alpha=0.05.
      reference (5000 sims) reports power=0.982. Seed=42, n_sims=5000.
    solve_for: "power"
    inputs:
      n_per_group: 12
      group_means: [40.0, 10.0, 10.0, 10.0]
      group_sds: 18.0
      distribution: "normal"
      alpha: 0.05
      n_sims: 5000
      seed: 42
    expected:
      n: 48
      achieved_power: 0.981
    tolerance:
      n: 0
      achieved_power: 0.015
    source: "Kruskal-Wallis Tests (Simulation) (Example 1)"
