chapter: "Confidence Intervals for an Exponential Lifetime Percentile"
method: "ci_exponential_lifetime_percentile"
examples:

  - id: "Ex1 p=20% width=0.1 (theta=1, 20% censored)"
    description: >
      Two-sided 95% CI for the 20th percentile of Exp(theta=1). The 20th
      percentile is tp=0.223. Target width 0.1 with 20% censoring. Ch.407
      reports E=81 events, expected N=102, actual width 0.099.
    inputs:
      theta: 1.0
      p: 0.20
      width: 0.1
      alpha: 0.05
      sides: 2
      pct_censored: 20.0
    expected:
      n: 102
      achieved_width: 0.099
    tolerance:
      n: 1
      achieved_width: 0.001
    source: "Confidence Intervals for an Exponential Lifetime Percentile (Example 1, row 1)"

  - id: "Ex1 p=30% width=0.1 (theta=1, 20% censored)"
    description: >
      Two-sided 95% CI for the 30th percentile of Exp(theta=1). The 30th
      percentile is tp=0.357. Target width 0.1 with 20% censoring. Ch.407
      reports E=200 events, expected N=250, actual width 0.100.
    inputs:
      theta: 1.0
      p: 0.30
      width: 0.1
      alpha: 0.05
      sides: 2
      pct_censored: 20.0
    expected:
      n: 250
      achieved_width: 0.100
    tolerance:
      n: 1
      achieved_width: 0.001
    source: "Confidence Intervals for an Exponential Lifetime Percentile (Example 1, row 2)"
