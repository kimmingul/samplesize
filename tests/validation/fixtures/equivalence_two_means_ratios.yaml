    expected: {n1: 250, n2: 250, achieved_power: 0.43421}
    tolerance: {n1: 0, n2: 0, achieved_power: 0.001}
    source: "Equivalence Tests for Two Means using Ratios (Example 1 row N=250 R1=1.05)"

  - id: "Ex1 N=550 R1=1.05"
    description: >
      Example 1: N1=N2=550, R1=1.05, CV=1.50, RL=0.80, RU=1.25,
