chapter: "One-Sample Logrank Tests"
method: "one_sample_logrank"
examples:

  - id: "Ex1 HR=0.7 Ta=1 Tf=1"
    description: >
      Ch.714 Example 1: two-sided, 90% power, alpha=0.05, M0=1.54,
      HR=0.7, k=1.67, Ta=1, Tf=1. Expected N=208.
    solve_for: "n"
    inputs:
      m0: 1.54
      hr: 0.7
      k: 1.67
      ta: 1.0
      tf: 1.0
      alpha: 0.05
      power: 0.90
      sides: 2
    expected:
      n: 208
      achieved_power: 0.9011
    tolerance:
      n: 3
      achieved_power: 0.015
    source: >
      reference/md/One-Sample Logrank Tests/hybrid_auto/One-Sample Logrank
      Tests.md, §Example 1.

  - id: "Ex2 Wu 2015 N=88"
    description: >
      Wu (2015): one-sided 80% power, alpha=0.05, M0=9, HR=0.5714, k=1.22,
      Ta=5, Tf=3. Expected N=88.
    solve_for: "n"
    inputs:
      m0: 9.0
      hr: 0.5714
      k: 1.22
      ta: 5.0
      tf: 3.0
      alpha: 0.05
      power: 0.80
      sides: 1
    expected:
      n: 88
      achieved_power: 0.8032
    tolerance:
      n: 2
      achieved_power: 0.015
    source: >
      reference/md/One-Sample Logrank Tests/hybrid_auto/One-Sample Logrank
      Tests.md, §Example 2.
