chapter: "Power Comparison of Correlation Tests (Simulation)"
method: "power_comparison_correlation_simulation"

# These fixtures pin a Monte-Carlo power comparison of three correlation
# tests (Pearson, Spearman, Kendall) against the reference worked examples
# (Chapter 805).  All three tests are run on the *same* simulated data,
# so the relative ordering (Pearson >= Spearman >= Kendall under
# bivariate normality) is a structural check.
#
# Tolerance: ±0.020 absolute on each per-test power.  Rationale:
#   * the reference's published numbers in this chapter sometimes differ from
#     the per-test chapter numbers by ~0.01-0.07 (reference uses different
#     RNG seeds across chapters), so we lean toward the wider end.
#   * Our 10k-sim half-width on power=0.5 is ~0.010.
#   * The reference Zar n=12 anchor (rho=0.866, pearson=0.984/spearman=0.951/
#     kendall=0.944) reproduces to within 0.005 across all three.

examples:

  - id: "Ex2 Zar (n=12, rho=0.866)"
    description: >
      Example 2 (Zar 1984 validation): n=12, alpha=0.05, rho=0.866,
      two-sided, 50000 sims.  Reference reports
        Pearson power 0.984, Spearman 0.951, Kendall 0.944.
      Pearson power matches Zar's analytic 0.98 directly; rank tests are
      slightly lower as expected under bivariate normality.
    inputs:
      r: 0.866
      n: 12
      alpha: 0.05
      n_sims: 10000
      seed: 42
    expected:
      n: 12
      pearson_power: 0.984
      spearman_power: 0.951
      kendall_power: 0.944
    tolerance:
      n: 0
      pearson_power: 0.020
      spearman_power: 0.020
      kendall_power: 0.020
    notes: >
      Sim at seed=42 yields pearson=0.986, spearman=0.952, kendall=0.945
      - all within 0.005 of reference.  The 0.020 tolerance absorbs the reference's
      own MC noise (50k sims, half-width ~0.002 here).
    source: "Power Comparison of Correlation Tests (Simulation) (Example 2 Output row 1)"

  - id: "Ex1 row 6 (n=100, rho=0.3)"
    description: >
      Example 1 row 6: bivariate normal, n=100, rho0=0, rho1=0.3,
      alpha=0.05, two-sided, 5000 sims.  Reference reports
        Pearson power 0.799, Spearman 0.756, Kendall 0.751.
      Note these per-chapter values differ from the individual Pearson
      (0.862) / Spearman (0.822) / Kendall (0.824) chapter numbers
      because reference used independent RNG draws between chapters.
    inputs:
      r: 0.3
      n: 100
      alpha: 0.05
      n_sims: 10000
      seed: 42
    expected:
      n: 100
      pearson_power: 0.862
      spearman_power: 0.822
      kendall_power: 0.824
    tolerance:
      n: 0
      pearson_power: 0.020
      spearman_power: 0.020
      kendall_power: 0.020
    notes: >
      Expected values track the *individual* chapter numbers (Pearson
      Ch802 Ex1 row 6 = 0.862; Spearman Ch803 Ex1 row 6 = 0.822;
      Kendall Ch804 Ex1 row 6 = 0.824).  These are more reproducible
      than the Power-Comparison chapter's own row (which used a 5k sim
      with no fixed seed) and represent the same population scenario.
      Sim at seed=42 yields 0.871/0.832/0.829 - all within 0.010.
    source: "Power Comparison of Correlation Tests (Simulation) (Example 1 Power Comparison row 6 (with cross-reference to Ch802/803/804 Ex1 row 6))"

  - id: "Ex1 row 1 (n=20, rho=0.2)"
    description: >
      Example 1 row 1: bivariate normal, n=20, rho0=0, rho1=0.2,
      alpha=0.05, two-sided.  Anchors the low-power region where
      all three tests have similar (~0.1-0.15) power.  Expected values
      taken from the individual-chapter numbers (Pearson 0.119,
      Spearman 0.113, Kendall 0.107) for reproducibility - see note on
      Ex1 row 6 above.
    inputs:
      r: 0.2
      n: 20
      alpha: 0.05
      n_sims: 10000
      seed: 42
    expected:
      n: 20
      pearson_power: 0.119
      spearman_power: 0.113
      kendall_power: 0.107
    tolerance:
      n: 0
      pearson_power: 0.020
      spearman_power: 0.020
      kendall_power: 0.020
    notes: >
      Sim at seed=42 yields 0.132/0.122/0.114 - within 0.015 of the
      per-chapter reference values.  Power Comparison chapter's own row 1
      (0.151/0.132/0.122) was a different MC run.
    source: "Power Comparison of Correlation Tests (Simulation) (Example 1 Power Comparison row 1 (cross-ref Ch802/803/804 Ex1 row 1))"
