chapter: "Poisson Regression"
method: "poisson_regression"
examples:

  # Example 1 – Power for several sample sizes (Ch.870 Example 1)
  # Normal X1 with mean=3.2, sigma=2.1; Exp(B0)=1.0; rate_ratio=1.3
  # alpha=0.05 two-sided; N=25 → power=0.90403
  - id: "Ex1 N=25 rate-ratio=1.3 normal-X1 power"
    description: >
      Chapter 870, Example 1 — Normal X1 (mu=3.2, sigma=2.1),
      Exp(B0)=1.0, rate_ratio=1.3, alpha=0.05 two-sided, N=25.
      Reference reports power=0.90403.
    inputs:
      exp_b0: 1.0
      rate_ratio: 1.3
      mu_t: 1.0
      phi: 1.0
      r_squared: 0.0
      x_dist: "normal"
      x_params: {mu: 3.2, sigma: 2.1}
      alpha: 0.05
      sides: 2
      n: 25
    expected: {n: 25, achieved_power: 0.90403}
    tolerance: {n: 0, achieved_power: 0.005}
    source: "Poisson Regression (Example 1)"

  # Example 2 – Validation using Signorini (1991) p. 449
  # Binomial X1 (pi=0.5); Exp(B0)=0.85; rate_ratio=1.3; one-sided alpha=0.05
  # power=0.80 → N=406; power=0.90 → N=556
  - id: "Ex2 Signorini validation power=0.80 binomial-X1 solve-n"
    description: >
      Chapter 870, Example 2 — Signorini (1991) validation.
      Binomial X1 (pi=0.5), Exp(B0)=0.85, rate_ratio=1.3, one-sided
      alpha=0.05, target power=0.80.  Signorini obtains N=406; reference=406.
    inputs:
      exp_b0: 0.85
      rate_ratio: 1.3
      mu_t: 1.0
      phi: 1.0
      r_squared: 0.0
      x_dist: "binomial"
      x_params: {pi: 0.5}
      alpha: 0.05
      sides: 1
      power: 0.80
    expected: {n: 406, achieved_power: 0.80}
    tolerance: {n: 2, achieved_power: 0.005}
    source: "Poisson Regression (Example 2)"

  - id: "Ex2 Signorini validation power=0.90 binomial-X1 solve-n"
    description: >
      Chapter 870, Example 2 — Signorini (1991) validation.
      Binomial X1 (pi=0.5), Exp(B0)=0.85, rate_ratio=1.3, one-sided
      alpha=0.05, target power=0.90.  Signorini obtains N=555; reference=556
      (rounding difference noted in reference manual).
    inputs:
      exp_b0: 0.85
      rate_ratio: 1.3
      mu_t: 1.0
      phi: 1.0
      r_squared: 0.0
      x_dist: "binomial"
      x_params: {pi: 0.5}
      alpha: 0.05
      sides: 1
      power: 0.90
    expected: {n: 556, achieved_power: 0.90}
    tolerance: {n: 2, achieved_power: 0.005}
    source: "Poisson Regression (Example 2)"
