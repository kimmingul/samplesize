      achieved_power: 0.90073
    tolerance:
      n: 0
      achieved_power: 0.0001
    source: "Tests for One Coefficient Alpha (Example 2, row CA1=0.70)"

  - id: "Ex3 Bonett K=5 (CA0=0, CA1=0.5, alpha=0.10, power=0.95)"
    description: >
      reference chapter 815 Example 3 (Bonett 2002 p. 337): CA0=0, CA1=0.5,
      K=5, alpha=0.10, power=0.95.  Reference reports N=59 with achieved
      power 0.95253, matching Bonett.
    inputs:
      ca0: 0.0
      ca1: 0.50
      k: 5
      alpha: 0.10
      power: 0.95
      sides: 2
