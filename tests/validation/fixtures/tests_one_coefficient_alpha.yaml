chapter: "Tests for One Coefficient Alpha"
method: "tests_one_coefficient_alpha"
examples:

  - id: "Ex1 N=100 (CA0=0.6, CA1=0.65, K=20, alpha=0.05, 2-sided)"
    description: >
      reference chapter 815 Example 1: CA0=0.6, CA1=0.65, K=20, alpha=0.05,
      two-sided.  At N=100, Reference reports power=0.16444.
    inputs:
      ca0: 0.6
      ca1: 0.65
      k: 20
      alpha: 0.05
      n: 100
      sides: 2
    expected:
      n: 100
      achieved_power: 0.16444
    tolerance:
      n: 0
      achieved_power: 0.0001
    source: "Tests for One Coefficient Alpha (Example 1, row N=100 CA1=0.65)"

  - id: "Ex1 N=500 (CA0=0.6, CA1=0.65, K=20, alpha=0.05, 2-sided)"
    description: >
      reference chapter 815 Example 1, row N=500 CA1=0.65: power=0.55224.
    inputs:
      ca0: 0.6
      ca1: 0.65
      k: 20
      alpha: 0.05
      n: 500
      sides: 2
    expected:
      n: 500
      achieved_power: 0.55224
    tolerance:
      n: 0
      achieved_power: 0.0001
    source: "Tests for One Coefficient Alpha (Example 1, row N=500 CA1=0.65)"

  - id: "Ex2 CA1=0.70 (solve N, power=0.90)"
    description: >
      reference chapter 815 Example 2: CA0=0.6, CA1=0.70, K=20, alpha=0.05,
      power=0.90, two-sided.  Reference reports N=265 with actual power
      0.90073.
    inputs:
      ca0: 0.6
      ca1: 0.70
      k: 20
      alpha: 0.05
      power: 0.90
      sides: 2
    expected:
