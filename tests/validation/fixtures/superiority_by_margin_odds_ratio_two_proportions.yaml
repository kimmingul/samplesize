chapter: "Superiority by a Margin Tests for the Odds Ratio of Two Proportions"
method: "superiority_by_margin_odds_ratio_two_proportions"
examples:

  - id: "Ex1 row 1 (n=50, OR1=2.0)"
    description: >
      Example 1: P2=0.65, OR0=1.4, OR1=2.0, alpha=0.025,
      one-sided H1: OR1>OR0, Farrington & Manning Likelihood Score
      test, Normal Approximation.  Reports power=0.12420 at N1=N2=50.
    inputs:
      p2: 0.65
      or0: 1.4
      or1: 2.0
      alpha: 0.025
      n1: 50
      n2: 50
      higher_is_better: true
    expected: {n1: 50, n2: 50, achieved_power: 0.12420}
    tolerance: {n1: 0, n2: 0, achieved_power: 0.001}
    source: "Superiority by a Margin Tests for the Odds Ratio of Two Proportions (Example 1 row 1)"

  - id: "Ex1 row 4 (n=200, OR1=2.0)"
    description: >
      Example 1 row 4: P2=0.65, OR0=1.4, OR1=2.0, alpha=0.025,
