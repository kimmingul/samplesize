  # ------------------------------------------------------------------
  # Example 6 - Validation using Senn (1993) page 217.
  # D = 0, limits = ±30, Sw = 45, alpha = 0.05, power = 0.80.
  # Senn / reference report N = 40, achieved power 0.8004.
