chapter: "Equivalence Tests for Two Means in a 2x2 Cross-Over Design using Differences"
method: "equivalence_cross_over_diff"

# Examples from the reference Chapter 520 ("Equivalence Tests for Two Means in
# a 2x2 Cross-Over Design using Differences").  Mechanics: exact
# Phillips (1990) / Owen's-Q TOST on the difference scale with
# df = N - 2 and SE = Sw * sqrt(2/N).
examples:

  # ------------------------------------------------------------------
  # Example 3 - Validation using Phillips (1990) page 142.  Standard
  # deviation, treatment mean, and limits are all expressed as
  # percentages of the reference mean.  Limits = ±20%, Sw = 20%,
  # alpha = 0.05, target power 0.70.  Phillips/reference report:
  #   D=0  -> N=16 (power 0.7031)
  #   D=-5 -> N=20 (power 0.7221)
  #   D=-10-> N=40 (power 0.7092)
  #   D=-15-> N=152 (power 0.7001)
  # ------------------------------------------------------------------
  - id: "Ex3 Phillips 1990 - D=0 N=16"
    description: >
      Phillips (1990) Table p.142 / Example 3 Chapter 520:
      limits = ±20, D = 0, Sw = 20, alpha = 0.05, target power 0.70.
      Reference reports N = 16, achieved power = 0.7031.
    inputs:
      lower_limit: -20.0
      upper_limit: 20.0
      diff: 0.0
      sd_w: 20.0
      alpha: 0.05
      power: 0.70
    expected: {n: 16, achieved_power: 0.7031}
    tolerance: {n: 0, achieved_power: 0.0001}
    source: "Equivalence Tests for Two Means in a 2x2 Cross-Over Design using Differences (Example 3 row D=0)"

  - id: "Ex3 Phillips 1990 - D=-5 N=20"
    description: >
      Phillips (1990) / Example 3 Chapter 520: limits = ±20,
      D = -5, Sw = 20, alpha = 0.05, target power 0.70.  Reference reports
      N = 20, achieved power = 0.7221.
    inputs:
      lower_limit: -20.0
      upper_limit: 20.0
      diff: -5.0
      sd_w: 20.0
      alpha: 0.05
      power: 0.70
    expected: {n: 20, achieved_power: 0.7221}
