  # ------------------------------------------------------------------
  # Example 4 - Validation using Machin et al. (1997) page 107.
  # Limits = ±20 (% of reference), D = 0, Sw = 40 (% of reference),
  # alpha = 0.10, power = 0.80. Machin/reference: N = 54, power 0.8050.
  # ------------------------------------------------------------------
  - id: "Ex4 Machin 1997 - N=54"
    description: >
      Machin et al. (1997) p.107 / Example 4 Chapter 520:
      limits = ±20 (% of reference), D = 0, Sw = 40 (% of reference),
      alpha = 0.10, target power 0.80.  Reference reports N = 54,
      achieved power = 0.8050.
    inputs:
