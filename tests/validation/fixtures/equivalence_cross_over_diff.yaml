    expected: {n: 54, achieved_power: 0.8050}
    tolerance: {n: 0, achieved_power: 0.0001}
    source: "Equivalence Tests for Two Means in a 2x2 Cross-Over Design using Differences (Example 4 - Validation using Machin)"

