      Phillips (1990) / Example 3 Chapter 520: limits = ±20,
      D = -10, Sw = 20, alpha = 0.05, target power 0.70.  reference
      reports N = 40, achieved power = 0.7092.
    inputs:
      lower_limit: -20.0
      upper_limit: 20.0
      diff: -10.0
      sd_w: 20.0
      alpha: 0.05
      power: 0.70
    expected: {n: 40, achieved_power: 0.7092}
