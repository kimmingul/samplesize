chapter: "Non-Inferiority Tests for the Difference of Two Means in a Higher-Order Cross-Over Design"
method: "non_inferiority_higher_order_cross_over_diff"
examples:

  # Example 1: 3x2 dual, alpha=0.025, D=0, sigma_w=10, higher better.
  - id: "Ex1 N=6 |NIM|=10 (3x2 dual) - power"
    description: >
      Chapter 530, Example 1.  3x2 dual, N = 6, |NIM| = 10,
      D = 0, sigma_w = 10, alpha = 0.025, higher means better.
      Expected power = 0.3837.
    inputs:
      margin: 10.0
      diff: 0.0
      sd_w: 10.0
      design: "two_sequence_dual"
      higher_means_better: true
      alpha: 0.025
      n: 6
    expected: {n: 6, achieved_power: 0.3837}
    tolerance: {n: 0, achieved_power: 0.001}
    source: "Non-Inferiority Tests for the Difference of Two Means in a Higher-Order Cross-Over Design (Example 1)"

  - id: "Ex1 N=46 |NIM|=10 (3x2 dual) - power"
