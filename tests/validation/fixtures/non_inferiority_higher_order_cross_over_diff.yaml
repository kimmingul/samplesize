  # Example 3: Validation against Chapter 540 (TOST upper-limit large).
  # Balaam design (2x4), |NIM|=0.20, D=0.05, sigma_w=0.10, alpha=0.05,
  # target power=0.90 => N = 16, achieved power = 0.9495.
  - id: "Ex3 Balaam |NIM|=0.20 D=0.05 power=0.90 - N"
    description: >
      Chapter 530, Example 3 - validation cross-check via Balaam
      (AA|BB|AB|BA).  |NIM| = 0.20, D = 0.05, sigma_w = 0.10,
      alpha = 0.05, target power = 0.90, higher means better.
      Expected N = 16, achieved power = 0.9495.
    inputs:
      margin: 0.20
      diff: 0.05
      sd_w: 0.10
      design: "balaam"
      higher_means_better: true
      alpha: 0.05
      power: 0.90
      equal_per_sequence: true
    expected: {n: 16, achieved_power: 0.9495}
    tolerance: {n: 0, achieved_power: 0.001}
    source: "Non-Inferiority Tests for the Difference of Two Means in a Higher-Order Cross-Over Design (Example 3)"
