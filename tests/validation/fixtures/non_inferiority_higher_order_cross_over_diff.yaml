  # Example 2: Sample Size (Equal Per Sequence).
  - id: "Ex2 |NIM|=5 power=0.80 (3x2 dual eqseq) - N"
    description: >
      Chapter 530, Example 2.  3x2 dual, |NIM| = 5, D = 0,
      sigma_w = 10, alpha = 0.025, target power 0.80, Sample Size
      (Equal Per Sequence).  Expected N = 50, achieved power = 0.8153.
    inputs:
      margin: 5.0
      diff: 0.0
      sd_w: 10.0
      design: "two_sequence_dual"
      higher_means_better: true
      alpha: 0.025
      power: 0.80
      equal_per_sequence: true
    expected: {n: 50, achieved_power: 0.8153}
    tolerance: {n: 0, achieved_power: 0.001}
    source: "Non-Inferiority Tests for the Difference of Two Means in a Higher-Order Cross-Over Design (Example 2)"

  - id: "Ex2 |NIM|=10 power=0.80 (3x2 dual eqseq) - N"
    description: >
      Chapter 530, Example 2.  3x2 dual, |NIM| = 10, D = 0,
