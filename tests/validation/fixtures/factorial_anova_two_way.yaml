chapter: "Factorial Analysis of Variance"
method: "factorial_anova_two_way"
examples:

  - id: "Ex1 Dose(3)xDiet(2) power after study — factor A"
    description: >
      Ch.560 Example 1: 2-factor design, factor A (Dose) 3 levels,
      factor B (Diet) 2 levels, n=2 per cell, sigma=2.3094.
      Cell means: D1=[15,16.5,25.5], D2=[19.5,20,38.5].
      Reference reports power for A = 1.0000.
    inputs:
      cell_means: [[15.0, 19.5], [16.5, 20.0], [25.5, 38.5]]
      sigma: 2.3094
      n: 2
      alpha: 0.05
      effect: "A"
    expected: {n_per_cell: 2, achieved_power: 1.0}
    tolerance: {n_per_cell: 0, achieved_power: 0.001}
    source: "Factorial Analysis of Variance (Example 1)"

  - id: "Ex1 Dose(3)xDiet(2) power after study — factor B"
    description: >
      Ch.560 Example 1 continued: factor B (Diet) power.
      Reference reports power for B = 0.9905.
    inputs:
      cell_means: [[15.0, 19.5], [16.5, 20.0], [25.5, 38.5]]
      sigma: 2.3094
      n: 2
      alpha: 0.05
      effect: "B"
    expected: {n_per_cell: 2, achieved_power: 0.9905}
    tolerance: {n_per_cell: 0, achieved_power: 0.001}
    source: "Factorial Analysis of Variance (Example 1)"

  - id: "Ex1 Dose(3)xDiet(2) power after study — interaction AxB"
    description: >
      Ch.560 Example 1 continued: AxB interaction power.
      Reference reports power for AxB = 0.5889.
    inputs:
      cell_means: [[15.0, 19.5], [16.5, 20.0], [25.5, 38.5]]
      sigma: 2.3094
      n: 2
      alpha: 0.05
      effect: "AxB"
    expected: {n_per_cell: 2, achieved_power: 0.5889}
    tolerance: {n_per_cell: 0, achieved_power: 0.001}
    source: "Factorial Analysis of Variance (Example 1)"

  - id: "Ex6 Neter(1996) A(3)xB(2) factor A n=2"
    description: >
      Ch.560 Example 6 (Neter et al. 1996): factor A has 3 levels
      with means 50, 55, 45; factor B has 2 levels (sigma_m=1 for B);
      sigma=3, n=2 per cell, alpha=0.05.
      Reference reports power for A(3) = 0.9016.
    inputs:
      cell_means: [[50.0, 50.0], [55.0, 55.0], [45.0, 45.0]]
      sigma: 3.0
      n: 2
      alpha: 0.05
      effect: "A"
    expected: {n_per_cell: 2, achieved_power: 0.9016}
    tolerance: {n_per_cell: 0, achieved_power: 0.005}
    source: "Factorial Analysis of Variance (Example 6)"
