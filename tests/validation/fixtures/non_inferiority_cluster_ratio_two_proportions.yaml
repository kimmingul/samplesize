chapter: "Non-Inferiority Tests for the Ratio of Two Proportions in a Cluster-Randomized Design"
method: "non_inferiority_cluster_ratio_two_proportions"
examples:
  - id: "Ex1 K=4 R1=1.0"
    description: >
      NI test for ratio of two proportions in cluster RCT. P2=0.6, R0=0.92,
      P1.1=0.6 (R1=1.0), M=100, ICC=0.002, alpha=0.05, K1=K2=4.
      Higher proportions better. Farrington-Manning likelihood score test.
    inputs:
      p1: 0.6
      p2: 0.6
      r0: 0.92
      m: 100.0
      icc: 0.002
      alpha: 0.05
      k_clusters: 4
      higher_better: true
    expected:
      n: 800
      n_clusters: 8
      m_per_cluster: 100
      achieved_power: 0.37161
    tolerance:
      n: 2
      n_clusters: 1
      m_per_cluster: 0
      achieved_power: 0.005
    source: "Non-Inferiority Tests for the Ratio of Two Proportions in a Cluster-Randomized Design (Example 1)"

  - id: "Ex1 K=8 R1=1.0"
    description: >
      NI test for ratio of two proportions in cluster RCT. P2=0.6, R0=0.92,
      P1.1=0.6 (R1=1.0), M=100, ICC=0.002, alpha=0.05, K1=K2=8.
    inputs:
      p1: 0.6
      p2: 0.6
      r0: 0.92
      m: 100.0
      icc: 0.002
      alpha: 0.05
      k_clusters: 8
      higher_better: true
    expected:
      n: 1600
      n_clusters: 16
      m_per_cluster: 100
      achieved_power: 0.58634
    tolerance:
      n: 2
      n_clusters: 1
      m_per_cluster: 0
      achieved_power: 0.005
    source: "Non-Inferiority Tests for the Ratio of Two Proportions in a Cluster-Randomized Design (Example 1)"
