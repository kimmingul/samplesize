chapter: "Two-Sample Z-Tests Allowing Unequal Variance (Enter Difference)"
method: "two_sample_z_unequal_var_diff"
notes: |
  Same power formula as the (Enter Means) sibling, but the
  parameterisation enters delta = mu1 - mu2 directly.  Validated
  against reference chapter Examples 1, 2 and 4.  All scenarios match
  reference to 5 decimal places in achieved power and to the exact
  integer in N.

examples:

  - id: "Ex1 row1 anesthesia (find N, delta=2, two-sided, alpha=0.01)"
    description: >
      delta=2, sigma1=4.1, sigma2=5.3, alpha=0.01, target
      power=0.90.  Reference reports N1=N2=168,
      achieved_power=0.90197.
    inputs:
      delta: 2.0
      sd1: 4.1
      sd2: 5.3
      alpha: 0.01
      power: 0.90
      sides: 2
    expected: {n1: 168, n2: 168, achieved_power: 0.90197}
    tolerance: {n1: 0, n2: 0, achieved_power: 0.0001}
    source: "Two-Sample Z-Tests Allowing Unequal Variance (Enter Difference) (Example 1 (row 1))"

  - id: "Ex1 row2 anesthesia (find N, delta=2, two-sided, alpha=0.05)"
    description: >
      Same delta as row 1 but alpha=0.05.  Reference reports
      N1=N2=118, achieved_power=0.90013.
    inputs:
      delta: 2.0
      sd1: 4.1
      sd2: 5.3
      alpha: 0.05
      power: 0.90
      sides: 2
    expected: {n1: 118, n2: 118, achieved_power: 0.90013}
    tolerance: {n1: 0, n2: 0, achieved_power: 0.0001}
    source: "Two-Sample Z-Tests Allowing Unequal Variance (Enter Difference) (Example 1 (row 2))"

  - id: "Ex2 row1 fertilizer (find power, delta=10, one-sided, n=10)"
    description: >
      One-sided Ha: delta > 0.  delta=10, sigma1=24, sigma2=26,
      alpha=0.05, n1=n2=10.  Reference reports power=0.22628.
    inputs:
      delta: 10.0
      sd1: 24.0
      sd2: 26.0
      alpha: 0.05
      n1: 10
      n2: 10
      sides: 1
    expected: {n1: 10, n2: 10, achieved_power: 0.22628}
    tolerance: {n1: 0, n2: 0, achieved_power: 0.0001}
    source: "Two-Sample Z-Tests Allowing Unequal Variance (Enter Difference) (Example 2 (n=10))"

  - id: "Ex2 row6 fertilizer (find power, delta=10, one-sided, n=60)"
    description: >
      Same one-sided scenario at n1=n2=60.  Reference reports
      power=0.70688.
    inputs:
      delta: 10.0
      sd1: 24.0
      sd2: 26.0
      alpha: 0.05
      n1: 60
      n2: 60
      sides: 1
    expected: {n1: 60, n2: 60, achieved_power: 0.70688}
    tolerance: {n1: 0, n2: 0, achieved_power: 0.0001}
    source: "Two-Sample Z-Tests Allowing Unequal Variance (Enter Difference) (Example 2 (n=60))"

  - id: "Ex4 Chow Shao Wang 2008 (validation, sigma1=sigma2=0.1)"
    description: >
      Chow, Shao & Wang (2008) pp.63-64.  delta=0.05,
      sigma1=sigma2=0.10, power=0.80, alpha=0.05.  Reference reports
      N1=N2=63, achieved_power=0.80130.
    inputs:
      delta: 0.05
      sd1: 0.1
      sd2: 0.1
      alpha: 0.05
      power: 0.80
      sides: 2
    expected: {n1: 63, n2: 63, achieved_power: 0.80130}
    tolerance: {n1: 0, n2: 0, achieved_power: 0.0001}
    source: "Two-Sample Z-Tests Allowing Unequal Variance (Enter Difference) (Example 4)"
