    tolerance: {n1: 0, n2: 0, achieved_power: 0.001}
    source: "Non-Inferiority Tests for Two Means using Ratios (Example 1 / Example 2 row N=200 R1=1.00)"

  - id: "Ex1 N=300 R1=1.00"
    description: >
      Example 1 / 2: N1=N2=300, R1=1.00, CV=1.50, NIM=0.20,
      alpha=0.025.  reference power = 0.70997.
