chapter: "Conditional Power of Logrank Tests"
method: "conditional_power_logrank"
examples:
  - id: "Ex1 Zk=-2.0 one-sided alpha=0.025 E=200 Ek=100 HR=0.8 P1=0.5"
    description: "One-sided CP for logrank test; interim z=-2.0 at halfway point (validated by hand in Ex2)"
    solve_for: "conditional_power"
    inputs:
      hazard_ratio: 0.8
      events: 200
      events_t: 100
      p1: 0.5
      z_observed: -2.0
      alpha: 0.025
      sides: 1
      direction: "lower"
    expected:
      conditional_power: 0.63454
      achieved_power: 0.63454
    tolerance:
      conditional_power: 0.005
      achieved_power: 0.005
    source: "Conditional Power of Logrank Tests (Example 1 row 3 and §Example 2 (validation))"

  - id: "Ex1 Zk=-3.0 one-sided alpha=0.025 E=200 Ek=100 HR=0.8 P1=0.5"
    description: "One-sided CP for logrank test; interim z=-3.0 at halfway point"
    solve_for: "conditional_power"
    inputs:
      hazard_ratio: 0.8
      events: 200
      events_t: 100
      p1: 0.5
      z_observed: -3.0
      alpha: 0.025
      sides: 1
      direction: "lower"
    expected:
      conditional_power: 0.91051
      achieved_power: 0.91051
    tolerance:
      conditional_power: 0.005
      achieved_power: 0.005
    source: "Conditional Power of Logrank Tests (Example 1 row 1)"
